<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
</head>
<body>

<div class="header">Amazon Clone 🛍</div>

<div class="nav">
    <a href="product.html">Home</a>
    <a href="cart.html">Cart</a>
    <a href="wishlist.html">Wishlist</a>
</div>

<div style="text-align:center; margin:10px;">
    <input id="search" placeholder="Search products..." onkeyup="searchProduct()">
</div>

<div class="container" id="productList">

<div class="card">
<img src="https://m.media-amazon.com/images/I/61bK6PMOC3L._AC_UL1500_.jpg">
<h3>iPhone 14</h3>
<p>₹70000</p>
<p>⭐⭐⭐⭐☆</p>
<button onclick="addToCart('iPhone 14',70000,this.parentElement.querySelector('img').src)">Cart</button>
<button onclick="addToWishlist('iPhone 14',70000,this.parentElement.querySelector('img').src)">Wish</button>
</div>

<div class="card">
<img src="https://m.media-amazon.com/images/I/71d7rfSl0wL._AC_UL1500_.jpg">
<h3>Shoes</h3>
<p>₹2000</p>
<p>⭐⭐⭐⭐⭐</p>
<button onclick="addToCart('Shoes',2000,this.parentElement.querySelector('img').src)">Cart</button>
<button onclick="addToWishlist('Shoes',2000,this.parentElement.querySelector('img').src)">Wish</button>
</div>

</div>

</body>
</html>
