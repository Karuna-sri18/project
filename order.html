<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<script src="script.js"></script>
</head>

<body onload="loadOrders()">

<div class="header">Your Orders 📦</div>

<div id="orders"></div>

<script>
function loadOrders() {

    let orders = JSON.parse(localStorage.getItem("orders")) || [];
    let div = document.getElementById("orders");

    orders.forEach(order => {
        div.innerHTML += `<h3>Order Date: ${order.date}</h3>`;

        order.items.forEach(item => {
            div.innerHTML += `<p>${item.name} x ${item.qty}</p>`;
        });

        div.innerHTML += "<hr>";
    });
}
</script>

</body>
</html>
